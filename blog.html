<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - TI Sem Ilusão</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050505;
            --neon-green: #00FF88;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --font-display: 'Outfit', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
            --glow-subtle: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-display);
            display: flex(--font-display);
            min-height: 100vh;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0.95) 0%, rgba(5, 5, 5, 0) 100%);
            backdrop-filter: blur(5px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            margin-bottom: 5px;
        }

        .nav-link {
            font-family: var(--font-tech);
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--neon-green);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--neon-green);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .logo-text {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .logo-accent {
            color: var(--neon-green);
        }

        .header-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            animation: pulse-line 3s ease-in-out infinite;
        }

        @keyframes pulse-line {

            0%,
            100% {
                opacity: 0.5;
                width: 60px;
            }

            50% {
                opacity: 1;
                width: 100px;
            }
        }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            padding: 160px 20px 60px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .page-title {
            font-family: var(--font-tech);
            font-size: 0.75rem;
            color: var(--neon-green);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 50px;
            opacity: 0.8;
            text-align: center;
        }

        .page-title::before,
        .page-title::after {
            content: '//';
            opacity: 0.4;
            margin: 0 10px;
        }

        /* Grid de Posts */
        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Card de Post */
        .post-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .post-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .post-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .post-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-card:hover {
            border-color: rgba(0, 255, 136, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .post-date {
            font-family: var(--font-tech);
            font-size: 0.7rem;
            color: var(--neon-green);
            letter-spacing: 1px;
        }

        .post-category {
            font-family: var(--font-tech);
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .post-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
            line-height: 1.4;
            transition: color 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .post-card:hover .post-title {
            color: var(--neon-green);
        }

        .post-excerpt {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .post-read-more {
            font-family: var(--font-tech);
            font-size: 0.75rem;
            color: var(--neon-green);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .post-read-more:hover {
            gap: 15px;
        }

        .post-read-more i {
            font-size: 0.8rem;
        }

        /* --- FOOTER --- */
        footer {
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: var(--text-primary);
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .social-link:hover {
            border-color: var(--neon-green);
            color: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.2);
        }

        .copyright {
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 600px) {
            .logo-text {
                font-size: 1.3rem;
                letter-spacing: 2px;
            }

            .nav-menu {
                gap: 20px;
            }

            .page-title {
                font-size: 0.65rem;
                letter-spacing: 3px;
            }

            .page-title::before,
            .page-title::after {
                display: none;
            }

            .post-card {
                padding: 20px;
            }

            .post-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Início</a>
                <a href="blog.html" class="nav-link active">Blog</a>
                <a href="sobre.html" class="nav-link">Sobre</a>
            </nav>
            <div class="logo-text">
                TI <span class="logo-accent">Sem</span> Ilusão
            </div>
            <div class="header-line"></div>
        </div>
    </header>

    <main>
        <h1 class="page-title">Últimos Artigos</h1>

        <div class="posts-grid">

            <!-- Post 1 -->
            <article class="post-card">
                <div class="post-meta">
                    <span class="post-date">26 FEV 2026</span>
                    <span class="post-category">Segurança</span>
                </div>
                <a href="artigo-seguranca.html" class="post-title">Introdução à Segurança da Informação</a>
                <p class="post-excerpt">
                    Aprenda os conceitos fundamentais de segurança cibernética e como proteger seus sistemas contra
                    ameaças modernas...
                </p>
                <a href="artigo-seguranca.html" class="post-read-more">
                    Ler artigo <i class="fas fa-arrow-right"></i>
                </a>
            </article>

        </div>
    </main>

    <footer>
        <div class="social-container">
            <a href="https://www.instagram.com/tisemilusao/" target="_blank" class="social-link" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
        <div class="copyright">
            © 2026 TI Sem Ilusão. Todos os direitos reservados.
        </div>
    </footer>

</body>

</html>
